defaults:
  - _self_

model:
  keep_special: false
  selector:
    condition_on_rho: true
    hard: false
    tau_rank: 0.05
    gamma_rank: 2.0
    tau_gate: 0.2
  loss:
    tau: 1.0
    sweep_range: [0.1, 1.0, 10]
  optim:
    lr: 1e-3
    weight_decay: 1e-2
    betas: [0.9, 0.999]

data:
  shuffle: false
  max_length: 512
  dataset: "wikiann"
  config: null
  subset: 1.0
  encoder:
    family: "sbert"
    name: null

train:
  epochs: 10
  no_train: false
  continue: false
  checkpoint_path: model_10.pth

runtime:
  grid: false
  threads: 24
  interop_threads: 1
  device: "cpu"
  compile: false   # torch.compile the selector model (first epoch slower)
  data:
    rebuild: false
    test_subset: null
    batch_size: 64
    num_workers: 2
  eval:
    hard: false
    short_log: false
    skip: false
    sweep_range: [0.1, 1.0, 20]
    random_selector:
      runs: 5
      seed: 314

dora:
  exclude:
    - "runtime.*"
    - "train.no_train"
    - "train.continue"
    - "train.checkpoint_path"

run: 0
