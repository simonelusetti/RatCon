defaults:
  - _self_
  - override: default

model:
  selector:
    hard_type: "probabilistic_top_k"
    suppress_special_tokens: false
  loss:
    l_e: 1.0
    hard: false
    s_target: 0.3
    tau: 1.0
    l_tv: 0.0
    sweep_range: [0.1, 1.0, 10]
  optim:
    lr: 1e-3
    weight_decay: 1e-2
    betas: [0.9, 0.999]

data:
  shuffle: false
  max_length: 512
  dataset: "mr"
  config: null
  subset: 1.0
  encoder:
    family: "sbert"
    name: null

train:
  epochs: 30
  no_train: false
  continue: false

runtime:
  grid: false
  threads: 48
  interop_threads: 4
  device: "cpu"
  token_parallelism: false
  data:
    rebuild: false
    batch_size: 256
    num_workers: 4
    dynamic_batch:
      enabled: false
      min_batch_size: 16
      reduce_factor: 0.5
      min_available_ratio: 0.10
      max_swap_growth_mb: 128
  eval:
    short_log: false
    log_examples: 0
    hard: true
    split: "validation"
    sweep_range: [0.1, 1.0, 20]
    random_selector:
      runs: 5
      seed: 1234  

dora:
  exclude:
    - "slurm.*"
    - "runtime.*"
    - "train.no_train"
    - "train.continue"

array: 0

slurm:
  partition: "boost_usr_prod"
  gpus: 1
  mem_per_gpu: 32
  time: 240
  cpus_per_gpu: 8
  setup:
    - "module load python/3.11.7"
    - "source $HOME/RatCon/.venv/bin/activate"
    - "export SLURM_CPU_BIND=none"
    - "export HF_HOME=$HOME/hf-cache"
    - "export TRANSFORMERS_CACHE=$HF_HOME/transformers"
    - "export HF_DATASETS_CACHE=$HF_HOME/datasets"
    - "export HF_HUB_OFFLINE=1"
    - "export TRANSFORMERS_OFFLINE=1"
