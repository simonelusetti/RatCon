defaults:
  - _self_

model:
  keep_special: true
  selector:
    condition_on_rho: true
    use_hard: true
    tau_rank: 0.05
    gamma_rank: 2.0
    tau_gate: 0.2
  loss:
    tau: 1.0
    sweep_range: [0.1, 1.0, 10]
  optim:
    lr: 1e-3
    weight_decay: 1e-2
    betas: [0.9, 0.999]

data:
  shuffle: false
  max_length: 512
  dataset: "mr"
  config: null
  subset: 1.0
  encoder:
    family: "sbert"
    name: null

train:
  epochs: 10
  no_train: false
  continue: false
  checkpoint_path: model_10.pth

runtime:
  grid: false
  threads: 48
  interop_threads: 4
  device: "cpu"
  bf16: true      # BF16 autocast (big win on Sapphire Rapids / AMX CPUs)
  compile: false   # torch.compile the selector model (first epoch slower)
  data:
    rebuild: false
    test_subset: null
    batch_size: 64
    num_workers: 4
  eval:
    short_log: false
    skip_stsb: false
    split: "validation"
    sweep_range: [0.1, 1.0, 20]
    random_selector:
      runs: 5
      seed: 1234  

dora:
  exclude:
    - "slurm.*"
    - "runtime.*"
    - "train.no_train"
    - "train.continue"
    - "train.checkpoint_path"

run: 0

slurm:
  partition: "boost_usr_prod"
  gpus: 1
  mem_per_gpu: 32
  time: 240
  cpus_per_gpu: 8
  setup:
    - "module load python/3.11.7"
    - "source $HOME/RatCon/.venv/bin/activate"
    - "export SLURM_CPU_BIND=none"
    - "export HF_HOME=$HOME/hf-cache"
    - "export TRANSFORMERS_CACHE=$HF_HOME/transformers"
    - "export HF_DATASETS_CACHE=$HF_HOME/datasets"
    - "export HF_HUB_OFFLINE=1"
    - "export TRANSFORMERS_OFFLINE=1"
